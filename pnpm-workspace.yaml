# pnpm 11 requires an explicit build-script decision per dependency (strictDepBuilds).
# These are all trusted native-binary packages in the Nuxt/Vite toolchain.
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  maplibre-gl: true
  unrs-resolver: true
  vue-demi: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
